services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"                                          # ← add this
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro               # ← mount certs from host
    depends_on:
      - web-client
      - api-server
    networks:
      - iic-network

  web-client:
    build: ./frontend
    image: anshn11/iic-web-client:latest
    networks:
      - iic-network

  api-server:
    build: ./backend
    image: anshn11/iic-api-server:latest
    env_file:
      - ./backend/.env
    networks:
      - iic-network

networks:
  iic-network:
    driver: bridge