user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_max_body_size 100M;

    # Redirect HTTP → HTTPS for subdomain only
    server {
        listen 80;
        server_name iic.mnnit.ac.in;
        return 301 https://iic.mnnit.ac.in$request_uri;
    }

    # HTTPS for iic.mnnit.ac.in only
    server {
        listen 443 ssl;
        server_name iic.mnnit.ac.in;

        ssl_certificate     /etc/letsencrypt/live/iic.mnnit.ac.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/iic.mnnit.ac.in/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # --- FRONTEND ---
        location / {
            proxy_pass http://web-client:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # --- BACKEND API ---
        location /api/v1/ {
            proxy_pass http://api-server:6001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- DOCS ---
        location /docs {
            proxy_pass http://api-server:6001/docs;
            proxy_set_header Host $host;
        }

        # --- MCP ---
        location /mcp/ {
            proxy_pass http://api-server:8001/mcp/;
            proxy_set_header Host $host;
        }
    }
}